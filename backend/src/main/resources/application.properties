#logging Properties
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL}
logging.level.ca.bc.gov.nrs.fsp.api=${APP_LOG_LEVEL}
logging.level.org.springframework.boot.autoconfigure.logging=${SPRING_BOOT_AUTOCONFIG_LOG_LEVEL}
spring.mvc.log-request-details=${SPRING_SHOW_REQUEST_DETAILS}

#DB Properties
spring.datasource.url=${DB_JDBC_CONNECT_STRING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PWD}
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none

spring.r2dbc.url=r2dbcs:oracle:thin:@tcps://${ca.bc.gov.nrs.oracle.host}:${ca.bc.gov.nrs.oracle.port}/${ca.bc.gov.nrs.oracle.service}?javax.net.ssl.trustStore=${ca.bc.gov.nrs.oracle.keystore}&javax.net.ssl.trustStorePassword=${ca.bc.gov.nrs.oracle.secret}&javax.net.ssl.keyStore=${ca.bc.gov.nrs.oracle.keystore}&javax.net.ssl.keyStorePassword=${ca.bc.gov.nrs.oracle.secret}
spring.r2dbc.properties.oracle.r2dbc.tls.keyAlias=${ca.bc.gov.nrs.oracle.host}
spring.r2dbc.properties.oracle.r2dbc.tls.serverDnMatch=false
spring.r2dbc.username=${ca.bc.gov.nrs.oracle.username}
spring.r2dbc.password=${ca.bc.gov.nrs.oracle.password}
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initialSize=1
spring.r2dbc.pool.minIdle=1
spring.r2dbc.pool.maxSize=3
spring.r2dbc.pool.maxLifeTime=60000
spring.r2dbc.pool.maxIdleTime=45000
spring.r2dbc.pool.maxCreateConnectionTime=90000
spring.r2dbc.pool.poolName=FspApiPool

spring.jackson.deserialization.fail-on-unknown-properties=true
management.endpoint.metrics.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.datasource.hikari.max-lifetime=120000
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
spring.jmx.enabled=false
logging.file.name=/logs/app.log
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.clean-history-on-start=true
logging.logback.rollingpolicy.max-history=1
logging.pattern.file={"time_stamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%3p" ,"thread":"%t" ,"class":"%logger{36}","msg":"%replace(%msg){'[\n\r\"]',''}", "exception":"%replace(%rEx{10}){'[\n\r\"]',''}","http_event":%X{httpEvent:-""}}%nopex%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} | [%5p] | [%t] | [%logger{36}] | [%replace(%msg){'[\n\r\"]',''} %X{httpEvent}] | %replace(%rEx{10}){'[\n\r\"]',''}%nopex%n
#Print the queries
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${TOKEN_ISSUER_URL}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${TOKEN_ISSUER_URL}/protocol/openid-connect/certs
initialization.background.enabled=true

