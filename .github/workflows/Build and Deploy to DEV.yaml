name: Build & Deploy to OpenShift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ── Configure these in your repo's Settings → Secrets & Variables ──
  OPENSHIFT_URL:   ${{ secrets.OPENSHIFT_URL }}     # https://api.<cluster>:6443
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}   # service-account token with deploy rights
  OCP_NAMESPACE:   ${{ secrets.OCP_NAMESPACE }}     # target namespace / project
  DB_JDBC_CONNECT_STRING: ${{ secrets.DB_JDBC_CONNECT_STRING }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PWD: ${{ secrets.DB_PWD }}
  
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_REGISTRY_USER: ${{ github.actor }}
  IMAGE_REGISTRY_PASSWORD: ${{ github.token }}
  
  IMAGE_TAG: latest
  APP_NAME: fsp
  MIN_REPLICAS: 1
  MAX_REPLICAS: 2
  MIN_CPU: 300m
  MIN_MEM: 1G
  

jobs:
  # https://github.com/redhat-actions/buildah-build#readme
  build-and-push-backend:
    - name: Build Backend from Dockerfile
      runs-on: ubuntu-24.04
      uses: redhat-actions/buildah-build@v2
      with:
        image: ${{ env.APP_NAME }}-backend
        tags: ${{ env.IMAGE_TAG }}
        context: ./backend
        dockerfiles: |
          ./Dockerfile

    - name: Push backend to GHCR
      id: push-image-backend
      uses: redhat-actions/push-to-registry@v2
      with:
        image: ${{ steps.build-image-backend.outputs.image }}
        tags: ${{ steps.build-image-backend.outputs.tags }}
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ env.IMAGE_REGISTRY_USER }}
        password: ${{ env.IMAGE_REGISTRY_PASSWORD }}
  # ────────────────────────────────────────────────────────
  test-frontend:
    name: Lint & Test Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

  # ────────────────────────────────────────────────────────
  build-and-push-frontend:
    name: Build Frontend Image & Push
    runs-on: ubuntu-24.04
    needs: test-frontend
    # Only push on merges to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      registry-path: ${{ steps.push-image.outputs.registry-path }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend from Dockerfile
        id: build-image-frontend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}-frontend
          tags: ${{ env.IMAGE_TAG }}
          context: ./frontend
          dockerfiles: |
            ./frontend/Dockerfile

      - name: Push frontend to GHCR
        id: push-image-frontend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image-frontend.outputs.image }}
          tags: ${{ steps.build-image-frontend.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OpenShift
    runs-on: ubuntu-24.04
    needs: build-and-push-frontend
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift
        run: |
          oc login "${{ env.OPENSHIFT_URL }}" \
            --token="${{ env.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false
          oc project "${{ env.OCP_NAMESPACE }}-dev"
          
      - name: Tag backend image into OpenShift
        env:
          REGISTRY_PATH: ${{ needs.build-and-push-backend.outputs.registry-path }}
        run: |
          oc tag --source=docker $REGISTRY_PATH ${{ env.APP_NAME }}-backend:${{ env.IMAGE_TAG }} \
          --reference-policy=local

      - name: Substitute MIN_REPLICAS in backend manifest
        run: |
          sed -i "s|<MIN_REPLICAS>|${MIN_REPLICAS}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute MAX_REPLICAS in backend manifest
        run: |
          sed -i "s|<MAX_REPLICAS>|${MAX_REPLICAS}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute DB_JDBC_CONNECT_STRING in backend manifest
        run: |
          sed -i "s|<DB_JDBC_CONNECT_STRING>|${DB_JDBC_CONNECT_STRING}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute DB_USER in backend manifest
        run: |
          sed -i "s|<DB_USER>|${DB_USER}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute DB_PWD in backend manifest
        run: |
          sed -i "s|<DB_PWD>|${DB_PWD}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute MIN_CPU in backend manifest
        run: |
          sed -i "s|<MIN_CPU>|${MIN_CPU}|g" \
            backend/openshift/deployment.yaml
          
      - name: Substitute MIN_MEM in backend manifest
        run: |
          sed -i "s|<MIN_MEM>|${MIN_MEM}|g" \
            backend/openshift/deployment.yaml
          
      - name: Apply backend manifests
        run: oc apply -f backend/openshift/deployment.yaml

      - name: Perform backend rollout
        run: |
          oc rollout restart deployment/fsp-backend

      - name: Wait for backend rollout
        run: |
          oc rollout status deployment/fsp-backend
          
      - name: Tag frontend image into OpenShift
        env:
          REGISTRY_PATH: ${{ needs.build-and-push-frontend.outputs.registry-path }}
        run: |
          oc tag --source=docker $REGISTRY_PATH ${{ env.APP_NAME }}-frontend:${{ env.IMAGE_TAG }} \
          --reference-policy=local

      - name: Substitute image in frontend manifest
        run: |
          sed -i "s|<IMAGE_PLACEHOLDER>|image-registry.openshift-image-registry.svc:5000/${OCP_NAMESPACE}-dev/${APP_NAME}-frontend:${IMAGE_TAG}|g" \
            frontend/openshift/deployment.yaml

      - name: Apply frontend manifests
        run: oc apply -f frontend/openshift/deployment.yaml

      - name: Perform frontend rollout
        run: |
          oc rollout restart deployment/fsp-frontend
          
      - name: Wait for frontend rollout
        run: |
          oc rollout status deployment/fsp-frontend
