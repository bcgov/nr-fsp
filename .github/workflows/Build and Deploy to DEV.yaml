name: Build & Deploy to OpenShift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ── Configure these in your repo's Settings → Secrets & Variables ──
  REGISTRY:        ${{ secrets.REGISTRY }}          # e.g. quay.io or your OCP internal registry
  OPENSHIFT_URL:   ${{ secrets.OPENSHIFT_URL }}     # https://api.<cluster>:6443
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}   # service-account token with deploy rights
  OCP_NAMESPACE:   ${{ secrets.OCP_NAMESPACE }}     # target namespace / project
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_REGISTRY_USER: ${{ github.actor }}
  IMAGE_REGISTRY_PASSWORD: ${{ github.token }}
  IMAGE_TAGS: latest
  APP_NAME: hello-world

jobs:
  # ────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

  # ────────────────────────────────────────────────────────
  build-and-push:
    name: Build Image & Push
    runs-on: ubuntu-latest
    needs: test
    # Only push on merges to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Build from Dockerfile
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}
          tags: ${{ env.IMAGE_TAGS }}
          context: ./frontend
          dockerfiles: |
            ./frontend/Dockerfile

      - name: Push to GHCR
        id: push-image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OpenShift
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift
        run: |
          oc login "${{ env.OPENSHIFT_URL }}" \
            --token="${{ env.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=false
          oc project "${{ env.OCP_NAMESPACE }}-dev"
          oc tag ghcr.io/${{ github.repository_owner }}/hello-world@${{ needs.build-and-push.outputs.image }} hello-world:latest

      - name: Substitute image in manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ needs.build-and-push.outputs.image }}|g" \
            openshift/deployment.yaml

      - name: Apply manifests
        run: oc apply -f openshift/deployment.yaml

      - name: Wait for rollout
        run: |
          oc rollout status deployment/hello-world --timeout=120s

      - name: Print route URL
        run: |
          URL=$(oc get route hello-world -o jsonpath='{.spec.host}')
          echo "✅ Deployed to https://${URL}"